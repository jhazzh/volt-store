# Prevents Supabase free-tier 7-day idle pause.
name: Supabase keep-alive

on:
  schedule:
    - cron: "0 6 */3 * *" # every 3 days, 06:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping database
        run: psql "$DATABASE_URL" -c "select 1;"
        env:
          # Settings → Database → Connection string (URI), stored as repo secret
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
