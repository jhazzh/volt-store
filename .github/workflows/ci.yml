name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_placeholder
      SUPABASE_SECRET_KEY: sb_secret_placeholder
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test -- --run
      # sharp/postcss vulns live inside Next.js; no upstream fix yet. Allowlist
      # only these known advisories so new high vulns still fail CI.
      - name: Audit (ignore known unfixable Next.js advisories)
        run: |
          npx audit-ci --high \
            --allowlist GHSA-f88m-g3jw-g9cj GHSA-qx2v-qp2m-jg93
      - run: npm run build
